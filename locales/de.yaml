  busy_queue_cli: (Tipp) Ihre Nachricht wurde für den nächsten Zug in die Warteschlange gestellt. Verwenden Sie /busy interrupt,
    damit Enter den aktuellen Lauf stoppt, oder /busy steer, um während des Laufs einzuspeisen. Dieser Tipp wird nur einmal
    angezeigt.
  busy_steer: 💡 Erstmaliger Tipp — Ich habe Ihre Nachricht in den aktuellen Lauf umgeleitet; sie kommt nach dem nächsten Tool-Aufruf,
    anstatt zu unterbrechen. Senden Sie `/busy interrupt` oder `/busy queue`, um dies zu ändern, oder `/busy status` zum Prüfen.
    Dieser Hinweis erscheint nicht erneut.
  busy_steer_cli: (Tipp) Ihre Nachricht wurde in den aktuellen Lauf umgeleitet; sie kommt nach dem nächsten Tool-Aufruf. Verwenden
    Sie /busy interrupt oder /busy queue, um dies zu ändern. Dieser Tipp wird nur einmal angezeigt.
  openclaw_residue: 'Ein veraltetes OpenClaw-Verzeichnis wurde unter ~/.openclaw/ erkannt.


    Um Ihre Konfiguration, Ihren Speicher und Ihre Skills nach Hermes zu übertragen, führen Sie `hermes claw migrate` aus.


    Wenn Sie bereits migriert haben und das alte Verzeichnis archivieren möchten, führen Sie `hermes claw cleanup` aus (benennt
    es in ~/.openclaw.pre-migration um — OpenClaw funktioniert danach nicht mehr).


    Dieser Tipp wird nur einmal angezeigt.'
  tool_progress_cli: (Tipp) Dieses Tool hat etwas gedauert — ich streame jeden Schritt. Verwenden Sie /verbose, um die Fortschrittsmodi
    zu wechseln (all → new → off). Dieser Tipp wird nur einmal angezeigt.
  tool_progress_gateway: 💡 Erstmaliger Tipp — Dieses Tool hat etwas gedauert und ich streame jeden Schritt. Wenn die Fortschrittsmeldungen
    zu lärmig sind, senden Sie `/verbose`, um die Modi zu wechseln (all → new → off). Dieser Hinweis erscheint nicht erneut.
