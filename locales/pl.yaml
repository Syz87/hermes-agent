onboarding:
  busy_queue: 💡 Wskazówka na pierwszy raz — Twoja wiadomość została dodana do kolejki zamiast przerywać. Wyślij `/busy interrupt`
    aby nowe wiadomości natychmiast przerywały bieżące zadanie, lub `/busy status` aby sprawdzić. Ten komunikat nie pojawi
    się ponownie.
  busy_steer: 💡 Wskazówka na pierwszy raz — Twoja wiadomość została przekierowana do bieżącego uruchomienia; dotrze po następnym
    wywołaniu narzędzia zamiast przerywać. Wyślij `/busy interrupt` lub `/busy queue` aby to zmienić, lub `/busy status` aby
    sprawdzić. Ten komunikat nie pojawi się ponownie.
  busy_interrupt: 💡 Wskazówka na pierwszy raz — przerwałem bieżące zadanie aby odpowiedzieć. Wyślij `/busy queue` aby dodać
    wiadomości do kolejki na po zakończeniu bieżącego zadania, `/busy steer` aby wstawić je w trakcie bez przerywania, lub
    `/busy status` aby sprawdzić. Ten komunikat nie pojawi się ponownie.
  busy_queue_cli: (wskazówka) Twoja wiadomość została dodana do kolejki na następną turę. Użyj /busy interrupt aby Enter zatrzymywał
    bieżące uruchomienie zamiast tego, lub /busy steer aby wstawić w trakcie. Ta wskazówka pokazuje się tylko raz.
  busy_steer_cli: (wskazówka) Twoja wiadomość została przekierowana do bieżącego uruchomienia; dotrze po następnym wywołaniu
    narzędzia. Użyj /busy interrupt lub /busy queue aby to zmienić. Ta wskazówka pokazuje się tylko raz.
  busy_interrupt_cli: (wskazówka) Twoja wiadomość przerwała bieżące uruchomienie. Użyj /busy queue aby dodać wiadomości do
    kolejki na następną turę zamiast tego, lub /busy steer aby wstawić w trakcie. Ta wskazówka pokazuje się tylko raz.
  tool_progress_gateway: 💡 Wskazówka na pierwszy raz — to narzędzie trwało trochę i przesyłam każdy krok. Jeśli postepy wydają
