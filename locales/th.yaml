    (all → new → off) เคล็ดลับนี้แสดงเพียงครั้งเดียว
  openclaw_residue: 'พบไดเรกทอรี OpenClaw เก่าที่ ~/.openclaw/

    ในการย้าย config, ความจำ และ skills มาที่ Hermes ให้รัน `hermes claw migrate`

