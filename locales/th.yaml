onboarding:
  busy_queue: 💡 เคล็ดลับครั้งแรก — ผมคิวข้อความของคุณไว้แทนการขัดจังหวะ ส่ง `/busy interrupt` เพื่อให้ข้อความใหม่ หยุดงานปัจจุบันทันที
    หรือ `/busy status` เพื่อตรวจสอบ ประกาศนี้จะไม่แสดงอีก
  busy_steer: 💡 เคล็ดลับครั้งแรก — ผมนำข้อความของคุณเข้าสู่การทำงานปัจจุบัน; มันจะมาถึงหลังการเรียกเครื่องมือถัดไปแทน การขัดจังหวะ
    ส่ง `/busy interrupt` หรือ `/busy queue` เพื่อเปลี่ยน หรือ `/busy status` เพื่อตรวจสอบ ประกาศนี้จะไม่ แสดงอีก
  busy_interrupt: 💡 เคล็ดลับครั้งแรก — ผมขัดจังหวะงานปัจจุบันเพื่อตอบคุณ ส่ง `/busy queue` เพื่อคิวข้อความต่อเนื่อง ไว้หลังงานปัจจุบันแทน
    หรือ `/busy steer` เพื่อแทรกมันระหว่างทางโดยไม่ขัดจังหวะ หรือ `/busy status` เพื่อตรวจสอบ ประกาศนี้จะไม่แสดงอีก
  busy_queue_cli: (เคล็ดลับ) ข้อความของคุณถูกคิวไว้สำหรับเทิร์นถัดไป ใช้ /busy interrupt เพื่อให้ Enter หยุดงานปัจจุบัน แทน
    หรือ /busy steer เพื่อแทรกมันระหว่างทาง เคล็ดลับนี้แสดงเพียงครั้งเดียว
  busy_steer_cli: (เคล็ดลับ) ข้อความของคุณถูกนำเข้าสู่งานปัจจุบัน; มันจะมาถึงหลังการเรียกเครื่องมือถัดไป ใช้ /busy interrupt
    หรือ /busy queue เพื่อเปลี่ยน เคล็ดลับนี้แสดงเพียงครั้งเดียว
  busy_interrupt_cli: (เคล็ดลับ) ข้อความของคุณขัดจังหวะงานปัจจุบัน ใช้ /busy queue เพื่อคิวข้อความสำหรับเทิร์นถัดไป แทน หรือ
    /busy steer เพื่อแทรกมันระหว่างทาง เคล็ดลับนี้แสดงเพียงครั้งเดียว
  tool_progress_gateway: 💡 เคล็ดลับครั้งแรก — เครื่องมือนั้นใช้เวลาสักครู่และผมกำลังส่งทุกขั้นตอน หากรายงานความคืบหน้า รู้สึกมากเกินไป
